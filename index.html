<style>

let main=document.getElementById("main")

// ===== DASHBOARD =====

let total=180
let start=localStorage.getItem("start")

if(!start){
start=new Date().toISOString()
localStorage.setItem("start",start)
}

let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1
if(diff>total) diff=total

day.innerText=diff

circle.style.background=
`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`

// ===== GYM =====

function gym(){

main.innerHTML=`
<h2>💪 6 Day Gym Split</h2>

${dayBox("Chest",["Bench Press","Incline DB","Cable Fly"])}

${dayBox("Shoulder",["Overhead Press","Lateral Raise"])}

${dayBox("Full Body",["Deadlift","Burpees","Pushups"])}

<button onclick="location.reload()">⬅ Back</button>
`
}

function dayBox(title,list){

let h=`<div class="box"><b>${title}</b><br>`

list.forEach(e=>{
h+=`<label><input type="checkbox"> ${e}</label><br>`
})

h+=`</div>`
return h
}

// ===== SAVE WEIGHT =====

function saveWeight(){

let w=document.getElementById("weightInput").value

if(w==="") return

let time=new Date().toLocaleDateString()

let list=JSON.parse(localStorage.getItem("weightList")||"[]")

list.unshift({
weight:w,
time:time
})

localStorage.setItem("weightList",JSON.stringify(list))

document.getElementById("weightInput").value=""

loadWeight()

}


// ===== LOAD WEIGHT =====

function loadWeight(){

let list=JSON.parse(localStorage.getItem("weightList")||"[]")

let html=""

list.forEach(w=>{

html+=`

<div class="box">

<b>${w.time}</b><br>
Weight : ${w.weight} kg

</div>

`

})

document.getElementById("weightList").innerHTML=html

}

// ===== SSC SAVE SYSTEM =====

function setupSSC(){

let boxes=document.querySelectorAll(".ssc")

boxes.forEach((box,i)=>{

box.checked=localStorage.getItem("ssc"+i)==="true"

box.addEventListener("change",()=>{
localStorage.setItem("ssc"+i,box.checked)
updateSSC()
})

})

updateSSC()

}


// ===== SSC PROGRESS =====

function updateSSC(){

let boxes=document.querySelectorAll(".ssc")

let total=boxes.length
let done=0

boxes.forEach(b=>{
if(b.checked) done++
})

let percent=Math.round((done/total)*100)

document.getElementById("sscBar").style.width=percent+"%"
document.getElementById("sscText").innerText=percent+"% Completed"

}

// ===== BUSINESS =====

function business(){

main.innerHTML=`
<h2>💰 Winning Products</h2>

<input id="productName" placeholder="Product name">

<button onclick="addProduct()">Add</button>

<div id="productList"></div>

<button onclick="location.reload()">⬅ Back</button>
`

loadProducts()
}

function addProduct(){

let name=document.getElementById("productName").value
if(!name) return

let list=JSON.parse(localStorage.getItem("products")||"[]")
list.push(name)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()
}

function loadProducts(){

let list=JSON.parse(localStorage.getItem("products")||"[]")

let html=""

list.forEach((p,i)=>{

html+=`
<div class="box">
${p}
<button onclick="deleteProduct(${i})">❌</button>
</div>
`

})

document.getElementById("productList").innerHTML=html
}

function deleteProduct(i){

let list=JSON.parse(localStorage.getItem("products")||"[]")

list.splice(i,1)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()
}

// ===== SELFIE =====

function selfie(){

main.innerHTML=`

<h2>📸 Daily Selfie</h2>

<input type="file" accept="image/*" capture="camera" onchange="saveSelfie(event)">

<div id="selfieGallery"></div>

<button onclick="location.reload()">⬅ Back</button>

`

loadSelfies()

}

function saveSelfie(event){

let file=event.target.files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let img=e.target.result

let time=new Date().toLocaleString()

let list=JSON.parse(localStorage.getItem("selfies")||"[]")

list.push({
image:img,
time:time
})

localStorage.setItem("selfies",JSON.stringify(list))

loadSelfies()

}

reader.readAsDataURL(file)

}

function loadSelfies(){

let list=JSON.parse(localStorage.getItem("selfies")||"[]")

let html=""

list.forEach(item=>{
html+=`
<div class="box">
<b>${item.time}</b><br>
<img src="${item.image}" style="width:100%">
</div>
`
})

document.getElementById("selfieGallery").innerHTML=html

}
