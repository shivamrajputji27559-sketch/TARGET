<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICIPLINE AND PATIENCE</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0f172a;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
background:white;
min-height:100vh;
border-radius:25px 25px 0 0;
overflow:hidden;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-weight:bold;
}

.section{padding:20px}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px
}

.card{
background:#f1f5f9;
padding:18px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.circle{
width:160px;
height:160px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 5px 15px rgba(0,0,0,0.2)
}

.box{
background:#f8fafc;
padding:12px;
border-radius:12px;
margin:10px 0
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#111;
color:white;
margin-top:10px
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc
}

</style>
</head>

<body>

<div class="app">

<header>🔥 DICIPLINE AND PATIENCE</header>

<div class="section" id="main">

<div class="circle" id="circle">
<h1 id="day">1</h1>
<p>Days</p>
</div>

<div id="progressText" style="text-align:center;margin-top:10px;font-weight:bold"></div>

<div class="grid">

<div class="card" onclick="gym()">💪 GYM</div>
<div class="card" onclick="diet()">🥗 DIET</div>
<div class="card" onclick="ssc()">📚 SSC</div>
<div class="card" onclick="business()">💰 BUSINESS</div>
<div class="card" onclick="brahm()">🔱 BRAHMACHARYA</div>
<div class="card" onclick="selfie()">📸 SELFIE</div>
<div class="card" onclick="notes()">📝 NOTES</div>
<div class="card" onclick="notes()">🕕 Timetable</div>
</div>

</div>

</div>

<script>

// ===== DASHBOARD =====

let total=180
let start=localStorage.getItem("start")

if(!start){
start=new Date().toISOString()
localStorage.setItem("start",start)
}

let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1

if(diff>total) diff=total

day.innerText=diff

circle.style.background=
`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`


// ===== GYM =====

function gym(){

main.innerHTML=`

<h2>💪 6 Day Gym Split</h2>

${dayBox("Chest",
["Bench Press","Incline DB","Cable Fly"])}

${dayBox("Back",
["Pullups","Barbell Row","Lat Pulldown"])}

${dayBox("Legs",
["Squats","Leg Press","Calf Raise"])}

${dayBox("Shoulder",
["Overhead Press","Lateral Raise"])}

${dayBox("Arms",
["Bicep Curl","Tricep Dips"])}

${dayBox("Full Body",
["Deadlift","Burpees","Pushups"])}

<button onclick="location.reload()">⬅ Back</button>

`

}

function dayBox(title,list){

let h=`<div class="box"><b>${title}</b><br>`

list.forEach(e=>{
h+=`<label><input type="checkbox" class="g"> ${e}</label><br>`
})

h+=`</div>`

return h

}

    ${dayBox("MEAL 3 ",

      ${dayBox("MEAL 4 ",

${dayBox("MEAL 4 ",
<div class="box"> 4 ROTI+ BEFORE SLEEP MILK 100(ML)
<button onclick="location.reload()">⬅ Back</button>

`

// ===== BUSINESS =====

function business(){

main.innerHTML=`

<h2>💰 Winning Products</h2>

<input id="productName" placeholder="Product name">

<button onclick="addProduct()">Add Product</button>

<div id="productList"></div>

<button onclick="location.reload()">⬅ Back</button>

`

loadProducts()

}

function addProduct(){

let name=document.getElementById("productName").value

if(!name) return

let list=JSON.parse(localStorage.getItem("products")||"[]")

list.push(name)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()

}

function loadProducts(){

let list=JSON.parse(localStorage.getItem("products")||"[]")

let html=""

list.forEach((p,i)=>{

html+=`
<div class="box">
${p}
<button onclick="deleteProduct(${i})">❌</button>
</div>
`

})

document.getElementById("productList").innerHTML=html

}

function deleteProduct(i){

let list=JSON.parse(localStorage.getItem("products")||"[]")

list.splice(i,1)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()

}


// ===== BRAHMACHARYA =====

function brahm(){

let day=localStorage.getItem("brahm")||0

main.innerHTML=`

<h2>🔱 Brahmacharya Challenge</h2>

<div class="circle" id="circle">
<h1 id="day">1</h1>
<p>Days</p>

</div>


`

}

let d=parseInt(localStorage.getItem("brahm")||0)

d++

localStorage.setItem("brahm",d)

location.reload()

}

function resetDay(){

localStorage.setItem("brahm",0)

location.reload()

}

}

function saveNote(){

localStorage.setItem("notes",note.value)

alert("Saved")

}

</script>

</body>
</html>
