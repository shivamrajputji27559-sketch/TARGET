border-radius:8px;

<script>

// ===== DASHBOARD =====

let total=180
let start=localStorage.getItem("start")

if(!start){
start=new Date().toISOString()
localStorage.setItem("start",start)
}

let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1

if(diff>total) diff=total

day.innerText=diff

circle.style.background=
`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`


// ===== GYM =====

function gym(){

main.innerHTML=`

<h2>💪 6 Day Gym Split</h2>

${dayBox("Chest",
["Bench Press","Incline DB","Cable Fly"])}

${dayBox("Back",
["Pullups","Barbell Row","Lat Pulldown"])}

${dayBox("Legs",
["Squats","Leg Press","Calf Raise"])}

${dayBox("Shoulder",
["Overhead Press","Lateral Raise"])}

${dayBox("Arms",
["Bicep Curl","Tricep Dips"])}

${dayBox("Full Body",
["Deadlift","Burpees","Pushups"])}

<button onclick="location.reload()">⬅ Back</button>

`

}

function dayBox(title,list){

let h=`<div class="box"><b>${title}</b><br>`

list.forEach(e=>{
h+=`<label><input type="checkbox" class="g"> ${e}</label><br>`
})

h+=`</div>`

return h

}

// ===== BUSINESS =====

function business(){

main.innerHTML=`

<h2>💰 Winning Products</h2>

<input id="productName" placeholder="Product name">

<button onclick="addProduct()">Add Product</button>

<div id="productList"></div>

<button onclick="location.reload()">⬅ Back</button>

`

loadProducts()

}

function addProduct(){

let name=document.getElementById("productName").value

if(!name) return

let list=JSON.parse(localStorage.getItem("products")||"[]")

list.push(name)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()

}

function loadProducts(){

let list=JSON.parse(localStorage.getItem("products")||"[]")

let html=""

list.forEach((p,i)=>{

html+=`
<div class="box">
${p}
<button onclick="deleteProduct(${i})">❌</button>
</div>
`

})

document.getElementById("productList").innerHTML=html

}

function deleteProduct(i){

let list=JSON.parse(localStorage.getItem("products")||"[]")

list.splice(i,1)

localStorage.setItem("products",JSON.stringify(list))

loadProducts()

}

// ===== SELFIE =====



}
function selfie(){

main.innerHTML=`

<h2>📸 Daily Selfie</h2>

<input type="file" accept="image/*" capture="camera" onchange="saveSelfie(event)">

<div id="selfieGallery"></div>

<button onclick="location.reload()">⬅ Back</button>

`

loadSelfies()

}


function saveSelfie(event){

let file=event.target.files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let imgData=e.target.result

let list=JSON.parse(localStorage.getItem("selfies")||"[]")

list.push(imgData)

localStorage.setItem("selfies",JSON.stringify(list))

loadSelfies()

}

reader.readAsDataURL(file)

}


function loadSelfies(){

let list=JSON.parse(localStorage.getItem("selfies")||"[]")

let html=""

list.forEach(img=>{

html+=`

<div class="box">

<img src="${img}" style="width:100%;border-radius:10px">

</div>

`

})

document.getElementById("selfieGallery").innerHTML=html

}
// ===== NOTES =====



localStorage.setItem("notes",note.value)
function notes(){

main.innerHTML=`

<h2>📝 Notes</h2>

<textarea id="noteInput" placeholder="Write your note..."></textarea>

<div id="notesList"></div>

<button onclick="location.reload()">⬅ Back</button>

`

loadNotes()

document.getElementById("noteInput").addEventListener("keyup",saveNote)

}


function saveNote(){

let text=document.getElementById("noteInput").value

if(text.trim()==="") return

let now=new Date()

let time=now.toLocaleString()

let list=JSON.parse(localStorage.getItem("notesList")||"[]")

list.unshift({
text:text,
time:time
})

localStorage.setItem("notesList",JSON.stringify(list))

document.getElementById("noteInput").value=""

loadNotes()

}


function loadNotes(){

let list=JSON.parse(localStorage.getItem("notesList")||"[]")

let html=""

list.forEach((n,i)=>{

html+=`

<div class="box">

<b>${n.time}</b><br>

${n.text}

</div>

`

})

document.getElementById("notesList").innerHTML=html

}
